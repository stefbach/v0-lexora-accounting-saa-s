name: Playwright Tests (Robot Utilisateur Cloud)
on:
  push:
    branches-ignore:
      - main # Évite de faire tourner les tests en double sur la branche de production directe

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci || npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Build Next.js Application
      run: npm run build
      env:
        # On passe des variables fictives ou de test pour que le build Next.js réussisse sans bloquer
        NEXT_PUBLIC_SUPABASE_URL: https://supabase.co
        NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder

    - name: Run Playwright tests
      run: npx playwright test
      env:
        NEXT_PUBLIC_SUPABASE_URL: https://supabase.co
        NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
