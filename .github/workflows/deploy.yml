name: Deploy to Vercel Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        env:
          HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "::error::VERCEL_DEPLOY_HOOK_URL secret is empty or not set"
            exit 1
          fi
          echo "Calling Vercel deploy hook..."
          STATUS=$(curl -sS -X POST -o response.txt -w "%{http_code}" "$HOOK_URL")
          echo "HTTP status: $STATUS"
          echo "Response body:"
          cat response.txt
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "::error::Vercel deploy hook returned non-2xx ($STATUS)"
            exit 1
          fi
