name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Allow [skip-tests] in commit messages to bypass the whole job
jobs:
  detect-skip:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.detect.outputs.skip }}
    steps:
      - id: detect
        run: |
          MSG="${{ github.event.head_commit.message || github.event.pull_request.title }}"
          if [[ "$MSG" == *"[skip-tests]"* ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  unit:
    needs: detect-skip
    if: needs.detect-skip.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm test

  e2e:
    needs: detect-skip
    if: needs.detect-skip.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # Cache Playwright browsers between runs.
      - name: Get Playwright version
        id: playwright-version
        run: |
          VERSION=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # Si la DB de test n'est pas configurée, les specs ont test.skip(...) en
      # tête : la commande passe verte. La vraie suite tournera sur les
      # environnements ayant les secrets E2E_* configurés.
      - name: Build app
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL_TEST || 'http://localhost:54321' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY_TEST || 'placeholder' }}

      - name: Start Next.js
        run: npm start &
        env:
          PORT: 3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL_TEST || 'http://localhost:54321' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY_TEST || 'placeholder' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_TEST || 'placeholder' }}

      - name: Wait for app
        run: npx wait-on http://localhost:3000 -t 60000 || true

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          BASE_URL: http://localhost:3000
          DATABASE_URL_TEST: ${{ secrets.DATABASE_URL_TEST }}
          SUPABASE_URL_TEST: ${{ secrets.SUPABASE_URL_TEST }}
          SUPABASE_SERVICE_ROLE_KEY_TEST: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_TEST }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL_TEST || 'http://localhost:54321' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY_TEST || 'placeholder' }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_USER_B_EMAIL: ${{ secrets.E2E_USER_B_EMAIL }}
          E2E_USER_B_PASSWORD: ${{ secrets.E2E_USER_B_PASSWORD }}
          E2E_SOCIETE_A_ID: ${{ secrets.E2E_SOCIETE_A_ID }}
          E2E_SOCIETE_B_ID: ${{ secrets.E2E_SOCIETE_B_ID }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
